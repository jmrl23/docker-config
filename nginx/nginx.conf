worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    client_max_body_size 50m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" upstream=$upstream_addr';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # WebSocket-aware Connection header that still allows keepalive
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    upstream backend {
        # Round-robin across the 5 backend instances on the host
        server host.docker.internal:3001 max_fails=3 fail_timeout=30s;
        server host.docker.internal:3002 max_fails=3 fail_timeout=30s;
        server host.docker.internal:3003 max_fails=3 fail_timeout=30s;
        server host.docker.internal:3004 max_fails=3 fail_timeout=30s;
        server host.docker.internal:3005 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend {
        server host.docker.internal:3000;
        keepalive 16;
    }

    server {
        listen 0.0.0.0:80;
        server_name _;

        # nginx self-healthcheck
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Backend — /api/* load balanced across 3001-3005
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;

            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # Frontend — everything else
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;

            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }
}